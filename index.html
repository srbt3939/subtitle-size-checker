<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Subtitle Size Checker</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      padding: 1rem;
      background: #f4f4f4;
      color: #333;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .controls {
      margin: 0.5rem 0;
      text-align: center;
    }

    .control-row {
      margin: 0.5rem 0;
    }

    .controls input[type=range] {
      width: 60%;
      margin-left: 0.5rem;
    }

    .controls input[type=file] {
      margin-left: 0.5rem;
    }

    .controls select,
    .controls input[type=text] {
      margin-left: 0.5rem;
      padding: 0.25rem 0.5rem;
      font-size: 0.9rem;
    }

    .video-mock {
      position: relative;
      width: 640px;
      height: 360px;
      background: #000;
      margin: 1rem auto;
      border: 4px solid #333;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transition: width 0.1s, height 0.1s;
    }

    .video-mock img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .subtitle {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      padding: 0.5rem;
      margin: 0;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 1.2rem;
      text-align: center;
      word-wrap: break-word;
      line-height: 1.4;
      text-rendering: optimizeLegibility;
    }

    textarea {
      width: 100%;
      height: 4rem;
      font-size: 1rem;
      padding: 0.5rem;
      box-sizing: border-box;
      font-family: monospace;
      line-height: 1.5;
    }

    .instructions {
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web Subtitle Size Checker</h1>
    <p class="instructions">
      画面サイズは640×360。下の入力欄にキャプションを入力すると、擬似映像上に字幕が表示されます。
      MediaConvertでの出力サイズ感の確認にお使いください。
    </p>

    <div class="controls">
      <div class="control-row">
        <label for="video-width">幅: <span id="width-label">640</span>px</label>
        <input type="range" id="video-width" min="320" max="1920" step="10" value="640">
      </div>
      <div class="control-row">
        <label for="video-height">高さ: <span id="height-label">360</span>px</label>
        <input type="range" id="video-height" min="180" max="1080" step="10" value="360">
      </div>
      <div class="control-row">
        <label for="font-size">文字サイズ: <span id="font-size-label">19px</span></label>
        <input type="range" id="font-size" min="12" max="72" step="1" value="19">
      </div>
      <div class="control-row">
        <label for="font-family">フォント: </label>
        <select id="font-family">
          <option value="sans-serif">sans-serif</option>
          <option value="serif">serif</option>
          <option value="monospace">monospace</option>
          <option value="'Arial', sans-serif">Arial</option>
          <option value="'Helvetica', sans-serif">Helvetica</option>
          <option value="'Times New Roman', serif">Times New Roman</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="'Verdana', sans-serif">Verdana</option>
          <option value="'Georgia', serif">Georgia</option>
          <optgroup label="Google Fonts">
            <option value="google:Roboto">Roboto</option>
            <option value="google:Open Sans">Open Sans</option>
            <option value="google:Lato">Lato</option>
            <option value="google:Montserrat">Montserrat</option>
            <option value="google:Playfair Display">Playfair Display</option>
            <option value="google:Poppins">Poppins</option>
            <option value="google:Merriweather">Merriweather</option>
            <option value="google:Ubuntu">Ubuntu</option>
            <option value="google:Noto Sans JP">Noto Sans JP</option>
            <option value="google:Noto Serif JP">Noto Serif JP</option>
          </optgroup>
        </select>
      </div>
      <div class="control-row">
        <label for="custom-font">カスタムフォント名:</label>
        <input type="text" id="custom-font" placeholder="例: 'Comic Sans MS', cursive または google:Quattrocento Sans">
      </div>
      <div class="control-row">
        <label for="image-input">画像を選択:</label>
        <input type="file" id="image-input" accept="image/*">
      </div>
    </div>


    <div class="video-mock" id="video-mock">
      <img id="sample-img" src="https://via.placeholder.com/640x360.png?text=Sample+Video" alt="sample video" />
      <div class="subtitle" id="subtitle">ここに字幕が表示されます</div>
    </div>

    <textarea id="input" placeholder="ここに字幕テキストを入力
（改行も反映されます）"></textarea>
  </div>

  <script>
    const input = document.getElementById('input');
    const subtitle = document.getElementById('subtitle');
    const fontSizeControl = document.getElementById('font-size');
    const fontSizeLabel = document.getElementById('font-size-label');
    const widthControl = document.getElementById('video-width');
    const heightControl = document.getElementById('video-height');
    const widthLabel = document.getElementById('width-label');
    const heightLabel = document.getElementById('height-label');
    const videoMock = document.getElementById('video-mock');
    const imageInput = document.getElementById('image-input');
    const sampleImg = document.getElementById('sample-img');
    const fontFamilySelect = document.getElementById('font-family');
    const customFontInput = document.getElementById('custom-font');

    function updateSubtitle() {
      const lines = input.value.split('\n');
      subtitle.textContent = lines.join('\n');
    }

    function updateFontSize() {
      const size = Math.round(parseFloat(fontSizeControl.value));
      fontSizeControl.value = size;
      subtitle.style.fontSize = size + 'px';
      fontSizeLabel.textContent = size + 'px';
    }

    function updateFontFamily() {
      const customFont = customFontInput.value.trim();
      let fontValue = fontFamilySelect.value;
      
      if (customFont) {
        fontValue = customFont;
      }

      // Google Fonts の処理
      if (fontValue.startsWith('google:')) {
        const googleFontName = fontValue.substring(7); // 'google:' を削除
        loadGoogleFont(googleFontName);
        subtitle.style.fontFamily = `'${googleFontName}', sans-serif`;
      } else {
        // Google Fonts link を削除
        const existing = document.getElementById('google-font-link');
        if (existing) existing.remove();
        subtitle.style.fontFamily = fontValue;
      }
    }

    function loadGoogleFont(fontName) {
      // フォント名をクエリパラメータ形式に変換（スペースをプラスに）
      const familyParam = fontName.replace(/\s+/g, '+');
      const url = `https://fonts.googleapis.com/css2?family=${familyParam}&display=swap&subset=latin,latin-ext,cyrillic,greek,vietnamese,hiragana,katakana,chinese-simplified,chinese-traditional,korean,hebrew,arabic,devanagari,thai`;
      
      // 既存の link タグを削除（重複を避けるため）
      const existing = document.getElementById('google-font-link');
      if (existing) existing.remove();
      
      // 新しい link タグを head に追加
      const link = document.createElement('link');
      link.id = 'google-font-link';
      link.rel = 'stylesheet';
      link.href = url;
      document.head.appendChild(link);
    }

    function updateVideoSize() {
      const width = Math.round(parseFloat(widthControl.value));
      const height = Math.round(parseFloat(heightControl.value));
      widthControl.value = width;
      heightControl.value = height;
      videoMock.style.width = width + 'px';
      videoMock.style.height = height + 'px';
      widthLabel.textContent = width;
      heightLabel.textContent = height;
    }

    input.addEventListener('input', updateSubtitle);
    fontSizeControl.addEventListener('input', updateFontSize);
    widthControl.addEventListener('input', updateVideoSize);
    heightControl.addEventListener('input', updateVideoSize);
    fontFamilySelect.addEventListener('change', updateFontFamily);
    customFontInput.addEventListener('input', updateFontFamily);

    // image input handler
    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          sampleImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // initialize font size label
    updateFontSize();
  </script>
</body>
</html>
